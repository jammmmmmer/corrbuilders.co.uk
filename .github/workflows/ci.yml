name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate static site bundle
        run: python3 scripts/validate_site.py

      - name: Package deploy artifact
        run: zip -r corrbuilders-deploy.zip index.html netlify.toml

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: corrbuilders-deploy
          path: corrbuilders-deploy.zip
